name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
            target: "x86_64-apple-darwin"
          - platform: "macos-14"
            args: "--target aarch64-apple-darwin"
            target: "aarch64-apple-darwin"
          - platform: "windows-latest"
            args: ""
            target: "x86_64-pc-windows-msvc"
          - platform: "ubuntu-22.04"
            args: ""
            target: "x86_64-unknown-linux-gnu"
            deps: |
              libwebkit2gtk-4.1-dev
              libayatana-appindicator3-dev
              librsvg2-dev
              patchelf
              libxdo-dev
              libudev-dev
              libdbus-1-dev

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri"

      - name: Install frontend dependencies
        run: npm install

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.deps }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: Leek Fund v0.1.0

      - name: Set artifact path
        id: artifact
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "macos-14" ]; then
            echo "path=src-tauri/target/aarch64-apple-darwin/release/bundle" >> $GITHUB_OUTPUT
          elif [ "${{ matrix.platform }}" = "macos-latest" ]; then
            echo "path=src-tauri/target/x86_64-apple-darwin/release/bundle" >> $GITHUB_OUTPUT
          else
            echo "path=src-tauri/target/release/bundle" >> $GITHUB_OUTPUT
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.platform }}-${{ matrix.target }}
          path: ${{ steps.artifact.outputs.path }}/**
